<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="faviconShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="url(#faviconGradient)" filter="url(#faviconShadow)"/>
  
  <!-- 数独网格 -->
  <g transform="translate(14, 14)">
    <!-- 外框 -->
    <rect x="0" y="0" width="36" height="36" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    
    <!-- 垂直分隔线 -->
    <line x1="12" y1="0" x2="12" y2="36" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="24" y1="0" x2="24" y2="36" stroke="white" stroke-width="2" opacity="0.9"/>
    
    <!-- 水平分隔线 -->
    <line x1="0" y1="12" x2="36" y2="12" stroke="white" stroke-width="2" opacity="0.9"/>
    <line x1="0" y1="24" x2="36" y2="24" stroke="white" stroke-width="2" opacity="0.9"/>
    
    <!-- 数字装饰 -->
    <text x="6" y="9" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">9</text>
    <text x="18" y="9" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">1</text>
    <text x="30" y="21" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">3</text>
    <text x="18" y="21" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">5</text>
    <text x="6" y="33" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">7</text>
  </g>
</svg>